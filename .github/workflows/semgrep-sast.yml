name: Semgrep

# Trigger on push
on:
    push:
        branches: ["**"]

jobs:
    semgrep-scan:
        name: Run Semgrep
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Run Semgrep
              uses: returntocorp/semgrep-action@v1
              with:
                  config: "p/default"
